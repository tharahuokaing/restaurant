<head>

<title>All ហួ កាំង Restaurant around the world</title>
<style>
  /* Background Rain Canvas Styling */
  #rainCanvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: -1;
    filter: blur(1.5px);
    background: #000;
  }
  body {
    margin: 0; padding: 0;
    font-family: 'Courier New', Courier, monospace;
    color: white;
    background: #000;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }
  header.hero {
    max-width: 900px;
    margin: 30px auto 15px;
    padding: 40px;
    background: rgba(0,0,0,0.75);
    border-radius: 10px;
    border: 1px solid rgba(0,255,0,0.1);
    text-align:center;
  }
  h1 {
    font-size: 2.5em;
    animation: colorChange 1.5s infinite alternate ease-in-out;
    margin: 0 0 20px;
  }
  @keyframes colorChange {
    0% { color: #00f; text-shadow: 0 0 5px #00f;}
    33% { color: #f00; text-shadow: 0 0 5px #f00;}
    66% { color: #0f0; text-shadow: 0 0 5px #0f0;}
    100% { color: #00f; text-shadow: 0 0 5px #00f;}
  }
  #intro-text {
    font-size: 1.25rem;
    max-width: 720px;
    margin: 0 auto;
    line-height: 1.5;
    color: #afa;
  }
  section {
    max-width: 900px;
    margin: 20px auto 40px;
    padding: 30px 40px;
    background: rgba(0,0,0,0.75);
    border-radius: 10px;
    border: 1px solid rgba(0,255,0,0.1);
  }
  h2 {
    margin-bottom: 20px;
  }
  ul, li {
    color: #ccc;
    margin-left: 1.3em;
  }
  ul.languages, ul.certifications {
    list-style-position: inside;
    padding-left: 0;
  }
  ul.languages li a,
  ul.certifications li {
    font-weight: bold;
    color: #0f0;
  }
  .btn {
    display: inline-block;
    padding: 8px 16px;
    margin: 8px 8px 16px 0;
    background: rgba(0,128,0,0.2);
    color: #0f0;
    border: 1px solid #0f0;
    text-decoration: none;
    border-radius: 4px;
    font-weight: bold;
    cursor: pointer;
    user-select: none;
    transition: all 0.3s ease;
    font-size: 0.9em;
    min-width: 90px;
    text-align: center;
  }
  .btn:hover, .btn:focus {
    background: #0f0;
    color: #000;
    box-shadow: 0 0 15px #0f0;
    outline: none;
  }
  #controls {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.95);
    border-top: 2px solid #0f0;
    padding: 18px 15px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;
    z-index: 10000;
  }
  #controls > * {
    flex-grow: 1;
    max-width: 170px;
    min-width: 140px;
  }
  #langSelect {
    width: 100%;
    padding: 8px;
    font-size: 1rem;
    border-radius: 5px;
    border: 1px solid #0f0;
    background-color: #000;
    color: #0f0;
  }
  #toggleVoiceBtn, #sendMessageBtn {
    width: 100%;
  }
  #logo {
    flex-basis: 100%;
    text-align: center;
    color: #39ff14;
    font-weight: bold;
    font-family: 'Courier New', Courier, monospace;
    font-size: 1.4rem;
    user-select: none;
    margin-top: 6px;
  }
  #aiPresentation {
    max-width: 900px;
    margin: 0 auto 30px;
    background-color: #101010dd;
    padding: 30px 40px;
    border-radius: 10px;
    border: 1px solid rgba(0,255,0,0.1);
    color: #afa;
    font-size: 1rem;
    line-height: 1.5;
  }
  #aiPresentation h2 {
    color: #39ff14;
    margin-bottom: 8px;
  }
  footer {
    max-width:900px; 
    margin: 20px auto 40px;
    padding:14px 20px;
    font-size:0.9em; 
    color:#e63946; 
    text-align:center;
    background-color: #0d0d0d;
    border-radius: 8px;
  }
  footer p, footer div {
    margin: 6px 0;
  }
  footer p:first-child {
    font-weight: bold;
    font-size: 1.1em;
  }
  footer .important-note {
    font-size: 0.8em;
    color:#ff914d;
  }
  footer .security-triad {
    font-size: 0.75em;
    color: #ccc;
  }
  footer .ethical-oath {
    font-size: 0.8em;
    color: #66ffcc;
    font-style: italic;
  }
  footer .whitehat {
    font-size: 0.8em;
    color: #999;
    filter: blur(1px);
  }
  @media (max-width: 640px) {
    #controls {
      flex-direction: column;
      max-height: 55vh;
      overflow-y: auto;
    }
    #controls > * {
      max-width: 100%;
      min-width: auto;
    }
  }
</style>
<link rel="shortcut icon" href="logo.png" type="image/jpeg" />
